version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: school_user
      POSTGRES_PASSWORD: school_password
      POSTGRES_DB: school_db
    ports:
      - "5432:5432"
    volumes:
      - school_pgdata:/var/lib/postgresql/data

volumes:
  school_pgdata: