version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lingo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_rahasia
      POSTGRES_DB: lang_learning_db
    ports:
      - "5432:5432"
    volumes:
      - lingo_pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    container_name: lingo_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password_rahasia
      - DB_NAME=lang_learning_db
      - DB_PORT=5432
      - JWT_SECRET=LINGO_SECRET_KEY_PROD
    depends_on:
      - db
    volumes:
      - lingo_uploads:/app/public/uploads

  frontend:
    build:
      context: ./frontend
    container_name: lingo_frontend
    restart: always
    ports:
      - "5173:3000" 
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  lingo_pgdata:
  lingo_uploads: 